<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>計算機アプリ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            -webkit-touch-callout: none;
        }
        
        .calculator-container {
            background: #ffffff;
            width: 100%;
            height: 100%;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }
        
        .display {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            text-align: right;
            flex: 0 0 auto;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .expression {
            font-size: 12px;
            color: #666;
            min-height: 16px;
            margin-bottom: 4px;
            word-break: break-all;
        }
        
        .result {
            font-size: clamp(24px, 8vw, 36px);
            color: #333;
            font-weight: bold;
            word-break: break-all;
            overflow-x: auto;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            flex: 1 1 auto;
            min-height: 0;
        }
        
        md-outlined-button {
            --md-outlined-button-container-height: 100%;
            --md-outlined-button-label-text-size: clamp(14px, 5vw, 20px);
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: background-color 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        md-outlined-button:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        md-outlined-button:active {
            background-color: rgba(0, 0, 0, 0.1);
        }
        
        md-outlined-button:focus-visible {
            outline: 2px solid #2196f3;
            outline-offset: 2px;
        }
        
        /* タッチデバイスでのタップハイライトを抑制 */
        md-outlined-button::-moz-focus-inner {
            border: 0;
        }
        
        .operator-btn {
            --md-outlined-button-label-text-color: #ff9800;
        }
        
        .function-btn {
            --md-outlined-button-label-text-color: #607d8b;
        }
        
        .equals-btn {
            --md-outlined-button-label-text-color: #4caf50;
        }
        
        .clear-btn {
            --md-outlined-button-label-text-color: #f44336;
        }
        

    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="buttons">
            <md-outlined-button class="clear-btn" data-action="clear">AC</md-outlined-button>
            <md-outlined-button class="function-btn" data-action="backspace">⌫</md-outlined-button>
            <md-outlined-button class="function-btn" data-action="percent">%</md-outlined-button>
            <md-outlined-button class="operator-btn" data-action="operator" data-value="/">÷</md-outlined-button>
            
            <md-outlined-button data-value="7">7</md-outlined-button>
            <md-outlined-button data-value="8">8</md-outlined-button>
            <md-outlined-button data-value="9">9</md-outlined-button>
            <md-outlined-button class="operator-btn" data-action="operator" data-value="*">×</md-outlined-button>
            
            <md-outlined-button data-value="4">4</md-outlined-button>
            <md-outlined-button data-value="5">5</md-outlined-button>
            <md-outlined-button data-value="6">6</md-outlined-button>
            <md-outlined-button class="operator-btn" data-action="operator" data-value="-">−</md-outlined-button>
            
            <md-outlined-button data-value="1">1</md-outlined-button>
            <md-outlined-button data-value="2">2</md-outlined-button>
            <md-outlined-button data-value="3">3</md-outlined-button>
            <md-outlined-button class="operator-btn" data-action="operator" data-value="+">+</md-outlined-button>
            
            <md-outlined-button data-action="negate">±</md-outlined-button>
            <md-outlined-button data-value="0">0</md-outlined-button>
            <md-outlined-button data-action="decimal">.</md-outlined-button>
            <md-outlined-button class="equals-btn" data-action="equals">=</md-outlined-button>
        </div>
    </div>

    <script type="module" src="./mwc.js"></script>
    <script>
        // 計算機のロジック
        class Calculator {
            constructor() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operator = null;
                this.shouldResetScreen = false;
                
                this.expressionEl = document.getElementById('expression');
                this.resultEl = document.getElementById('result');
                
                this.init();
            }
            
            init() {
                // ボタンイベントのバインディング
                document.querySelectorAll('md-outlined-button').forEach(button => {
                    // click イベントと touch イベントの両方に対応
                    button.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.handleButtonClick(button);
                    }, { passive: true });
                    
                    // タッチデバイス向けの追加サポート
                    button.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.handleButtonClick(button);
                    }, { passive: false });
                });
                
                // キーボードサポート
                document.addEventListener('keydown', (e) => {
                    this.handleKeyPress(e);
                });
                
                this.updateDisplay();
            }
            
            handleButtonClick(button) {
                // ダブルタップや重複イベントを防止
                if (button.dataset.processing === 'true') {
                    return;
                }
                button.dataset.processing = 'true';
                setTimeout(() => {
                    button.dataset.processing = 'false';
                }, 100);
                
                const value = button.getAttribute('data-value');
                const action = button.getAttribute('data-action');
                
                if (value !== null) {
                    this.inputNumber(value);
                } else if (action) {
                    this.handleAction(action, button.getAttribute('data-value'));
                }
            }
            
            handleKeyPress(e) {
                const key = e.key;
                
                if (/[0-9]/.test(key)) {
                    this.inputNumber(key);
                } else if (key === '+') {
                    e.preventDefault();
                    this.setOperator('+');
                } else if (key === '-') {
                    e.preventDefault();
                    this.setOperator('-');
                } else if (key === '*' || key === 'x') {
                    e.preventDefault();
                    this.setOperator('*');
                } else if (key === '/') {
                    e.preventDefault();
                    this.setOperator('/');
                } else if (key === '.') {
                    this.inputDecimal();
                } else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    this.calculate();
                } else if (key === 'Backspace') {
                    this.backspace();
                } else if (key === 'Escape' || key === 'c' || key === 'C') {
                    this.clear();
                } else if (key === '%') {
                    this.percent();
                }
            }
            
            inputNumber(num) {
                // 最大入力桁数の制限（15 桁）
                if (!this.shouldResetScreen && this.currentValue.replace('.', '').replace('-', '').length >= 15) {
                    return;
                }
                
                if (this.shouldResetScreen) {
                    this.currentValue = num;
                    this.shouldResetScreen = false;
                } else {
                    this.currentValue = this.currentValue === '0' ? num : this.currentValue + num;
                }
                this.updateDisplay();
            }
            
            inputDecimal() {
                if (this.shouldResetScreen) {
                    this.currentValue = '0.';
                    this.shouldResetScreen = false;
                } else if (!this.currentValue.includes('.')) {
                    this.currentValue += '.';
                }
                this.updateDisplay();
            }
            
            setOperator(op) {
                if (this.operator && !this.shouldResetScreen) {
                    this.calculate();
                }
                this.previousValue = this.currentValue;
                this.operator = op;
                this.shouldResetScreen = true;
                this.updateDisplay();
            }
            
            handleAction(action, value) {
                switch (action) {
                    case 'clear':
                        this.clear();
                        break;
                    case 'backspace':
                        this.backspace();
                        break;
                    case 'operator':
                        this.setOperator(value);
                        break;
                    case 'equals':
                        this.calculate();
                        break;
                    case 'decimal':
                        this.inputDecimal();
                        break;
                    case 'percent':
                        this.percent();
                        break;
                    case 'negate':
                        this.negate();
                        break;
                }
            }
            
            clear() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operator = null;
                this.shouldResetScreen = false;
                this.updateDisplay();
            }
            
            backspace() {
                if (this.currentValue === 'Error') {
                    this.clear();
                    return;
                }
                if (this.currentValue.length > 1) {
                    this.currentValue = this.currentValue.slice(0, -1);
                } else {
                    this.currentValue = '0';
                }
                this.updateDisplay();
            }
            
            calculate() {
                if (!this.operator || !this.previousValue) return;
                
                const prev = parseFloat(this.previousValue);
                const current = parseFloat(this.currentValue);
                let result;
                
                switch (this.operator) {
                    case '+':
                        result = prev + current;
                        break;
                    case '-':
                        result = prev - current;
                        break;
                    case '*':
                        result = prev * current;
                        break;
                    case '/':
                        if (current === 0) {
                            this.currentValue = 'Error';
                            this.previousValue = '';
                            this.operator = null;
                            this.updateDisplay();
                            return;
                        }
                        result = prev / current;
                        break;
                    default:
                        return;
                }
                
                // 無限小数・浮動小数点誤差の処理
                if (!Number.isFinite(result)) {
                    this.currentValue = 'Error';
                    this.previousValue = '';
                    this.operator = null;
                    this.shouldResetScreen = true;
                    this.updateDisplay();
                    return;
                }
                
                // 有効数字 12 桁に制限
                const absResult = Math.abs(result);
                if (absResult !== 0 && (absResult >= 1e12 || absResult < 1e-9)) {
                    this.currentValue = result.toExponential(8);
                } else {
                    result = Math.round(result * 1e12) / 1e12;
                    this.currentValue = String(result);
                }
                
                this.previousValue = '';
                this.operator = null;
                this.shouldResetScreen = true;
                this.updateDisplay();
            }
            
            percent() {
                const value = parseFloat(this.currentValue);
                if (isNaN(value)) return;
                this.currentValue = String(value / 100);
                this.updateDisplay();
            }
            
            negate() {
                const value = parseFloat(this.currentValue);
                if (isNaN(value)) return;
                this.currentValue = String(value * -1);
                this.updateDisplay();
            }
            
            updateDisplay() {
                this.resultEl.textContent = this.formatNumber(this.currentValue);
                
                if (this.previousValue && this.operator) {
                    const opSymbol = this.getOperatorSymbol(this.operator);
                    this.expressionEl.textContent = `${this.formatNumber(this.previousValue)} ${opSymbol}`;
                } else {
                    this.expressionEl.textContent = '';
                }
            }
            
            formatNumber(num) {
                if (num === 'Error') return num;
                
                // 指数表記の場合はそのまま返す（カンマ区切りしない）
                if (num.includes('e') || num.includes('E')) {
                    return num;
                }
                
                const parts = num.split('.');
                parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
                return parts.join('.');
            }
            
            getOperatorSymbol(op) {
                const symbols = {
                    '+': '+',
                    '-': '−',
                    '*': '×',
                    '/': '÷'
                };
                return symbols[op] || op;
            }
        }
        
        // カスタムエレメントの読み込みを待ってから初期化
        window.addEventListener('DOMContentLoaded', () => {
            // mwc.js の読み込み完了を待つ
            setTimeout(() => {
                new Calculator();
            }, 100);
        });
        
        // iframe メッセージ対応（親ウィンドウとの通信）
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'calculator') {
                console.log('Received message:', event.data);
            }
        });
        
        // 計算結果を親ウィンドウに通知
        const originalUpdateDisplay = Calculator.prototype.updateDisplay;
        Calculator.prototype.updateDisplay = function() {
            originalUpdateDisplay.call(this);
            
            // 親ウィンドウに計算結果を送信
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'calculator',
                    action: 'update',
                    value: this.currentValue,
                    expression: this.expressionEl.textContent
                }, '*');
            }
        };
    </script>
</body>
</html>
